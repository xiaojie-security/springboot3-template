database:
  host: 127.0.0.1
  port: 3306
  schema: temp
  username: root
  password: 1234

redis:
  database: 10
  host: 127.0.0.1
  port: 6379
  password: redis

application:
  auth:
    exclude-url:
      - /encrypt/public-key
  token:
    access:
      secret: ${SECURITY_ACCESS_SECRET}
      prefix: Bearer
      header: Authorization
    refresh:
      secret: ${SECURITY_REFRESH_SECRET}
      header: Refresh-Authorization
  encrypt:
    rsa:
      private-key: ${SECURITY_RSA_PRIVATE_KEY}
      public-key: ${SECURITY_RSA_PUBLIC_KEY}
  cache:
    type: redis
